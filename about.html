<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Haktan Yılmaz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Fira Code', monospace;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Üst Menü (Header) */
        header {
            padding: 20px 40px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #161b22;
        }
        header a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }
        header a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* İçerik Alanı */
        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center; /* İçeriği ortalar */
        }
        
        .markdown-body {
            max-width: 800px;
            width: 100%;
            background-color: #0d1117;
        }

        /* Markdown Tasarım Kuralları */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #58a6ff;
            margin-bottom: 15px;
            margin-top: 25px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
        }
        .markdown-body h1 { border-bottom: none; } /* En üst başlıkta çizgi olmasın */
        
        .markdown-body p {
            margin-bottom: 15px;
            font-family: Arial, sans-serif; /* Paragraflar daha okunaklı olsun diye düz font */
            font-size: 1.05rem;
        }
        
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 15px;
            padding-left: 20px;
            font-family: Arial, sans-serif;
        }

        .markdown-body a {
            color: #58a6ff;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .markdown-body hr {
            border: 0;
            height: 1px;
            background: #30363d;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">cd ~/home</a>
        <span style="color: #8b949e;">cat about_me.md</span>
    </header>

    <div class="content-area">
        <div class="markdown-body" id="about-content">
            <p style="color: #8b949e;">Fetching profile data from GitHub...</p>
        </div>
    </div>

    <script>
        // Senin Profil README dosyanın RAW (saf metin) linki
        const rawUrl = 'https://raw.githubusercontent.com/haktanylmz/haktanylmz/main/README.md';
        const contentArea = document.getElementById('about-content');

        async function loadAboutMe() {
            try {
                const response = await fetch(rawUrl);
                
                if (!response.ok) throw new Error('README.md dosyasına ulaşılamadı.');

                const markdownText = await response.text();

                // Markdown'ı HTML'e çevir ve ekrana bas
                contentArea.innerHTML = marked.parse(markdownText);
                
            } catch (error) {
                contentArea.innerHTML = `<p style="color: #ff7b72;">Error: ${error.message}</p>`;
            }
        }

        // Sayfa açıldığında veriyi çek
        window.onload = loadAboutMe;
    </script>
</body>
</html>
